<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VKAM 保險銷售員 21天培訓計劃</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
  }

  /* ===== LOGIN OVERLAY ===== */
  #loginOverlay {
    position: fixed; inset: 0; z-index: 9999;

  .login-box {

  .login-field input {

  .task-box ul li::before { content: '→'; opacity: 0.6; }

  .card-nav { padding: 20px 32px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .nav-btn {

  }
  .nav-btn.prev { background: #e2e8f0; color: #4a5568; }
  .nav-btn.prev:hover { background: #cbd5e0; }
  .nav-btn.next { background: #2b6cb0; color: white; }
  .nav-btn.next:hover { background: #2c5282; }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .mark-done-btn {
    padding: 10px 20px; border-radius: 10px; border: 2px solid #38a169;
    background: transparent; color: #38a169; font-size: 0.88rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .mark-done-btn:hover, .mark-done-btn.done { background: #38a169; color: white; }
  .submit-btn {
    padding: 10px 20px; border-radius: 10px; border: 2px solid #805ad5;
    background: transparent; color: #805ad5; font-size: 0.88rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  .submit-btn:hover { background: #805ad5; color: white; }

  /* Responsive - Mobile Optimization */
  @media (max-width: 768px) {
    /* Header */
    .header { padding: 15px 15px 12px; }
    .header h1 { font-size: 1.1rem; letter-spacing: 0; }
    .header p { font-size: 0.75rem; }

    .progress-bar-wrap { width: 100%; max-width: none; min-width: auto; }

    /* Week Tabs */
    .week-tabs { 
      padding: 0 10px; 
      gap: 6px;

    }
    .week-tab { 
      min-width: 80px; 
      padding: 10px 8px; 
      font-size: 0.75rem; 
      border-radius: 10px;
    }
    .week-tab .tab-emoji { font-size: 1.2rem; margin-bottom: 2px; }
    .week-tab .tab-sub { font-size: 0.65rem; }
    
    /* Main Layout */
    .main { 
      flex-direction: column; 
      padding: 0 10px; 
      margin: 15px auto 40px; 
      gap: 15px;
    }
    
    /* Day List Sidebar */
    .day-list { 
      width: 100%; 
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .day-list-title { 
      width: 100%;
      font-size: 0.7rem; 
      padding: 0 0 8px; 
      margin-bottom: 8px;
    }
    .day-btn { 
      width: auto; 
      flex: 1;
      min-width: 60px;
      padding: 8px 6px;

    }
    .day-btn .check { width: 14px; height: 14px; font-size: 0.6rem; }
    
    /* Card */
    .card-header { padding: 18px 15px 15px; }
    .card-header .card-day-num { font-size: 0.7rem; }

<body>

<!-- ===== LOGIN OVERLAY ===== -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">🏆</div>
    <div class="login-title">VKAM 保險銷售員培訓計劃</div>
    <div class="login-subtitle">請輸入你的姓名及培訓密碼以進入</div>
    <div class="login-field">
      <label>你的姓名</label>
      <input type="text" id="loginName" placeholder="例如：陳大文" autocomplete="off" />
    </div>
    <div class="login-field">
      <label>培訓密碼</label>
      <input type="password" id="loginPassword" placeholder="請輸入密碼" autocomplete="off" />
    </div>
    <div class="login-error" id="loginError">❌ 密碼錯誤，請重新輸入</div>
    <div class="login-error" id="loginNameError">❌ 請輸入你的姓名</div>
    <button class="login-btn" onclick="doLogin()">進入培訓 →</button>
    <div class="login-hint">如忘記密碼，請聯絡 <span>你的培訓負責人</span></div>
  </div>
</div>

<script>
// ===== 密碼設定（老闆可以修改這裡）=====
const TRAINING_PASSWORD = 'insurance2026';

function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pwd = document.getElementById('loginPassword').value;
  const nameErr = document.getElementById('loginNameError');
  const pwdErr = document.getElementById('loginError');
  const nameInput = document.getElementById('loginName');
  const pwdInput = document.getElementById('loginPassword');

  // Reset errors
  nameErr.classList.remove('show');
  pwdErr.classList.remove('show');
  nameInput.classList.remove('error');
  pwdInput.classList.remove('error');

  if (!name) {
    nameErr.classList.add('show');
    nameInput.classList.add('error');
    nameInput.focus();
    return;
  }
  if (pwd !== TRAINING_PASSWORD) {
    pwdErr.classList.add('show');
    pwdInput.classList.add('error');
    pwdInput.value = '';
    pwdInput.focus();
    return;
  }

  // Save name to use later
  sessionStorage.setItem('trainee_name', name);
  document.getElementById('loginOverlay').classList.add('hidden');
}

// Allow Enter key to submit
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('loginPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('loginName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('loginPassword').focus();
  });
});
</script>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>🏆 VKAM 保險銷售員 21天培訓計劃</h1>
      <p>混合班適用 · 循序漸進 · 理論+實戰並重</p>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>完成進度</span>
        <span id="progressText">0 / 21 天</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="user-badge">
      <span>👤</span>
      <span class="name" id="headerName">學員</span>
      <button class="logout-btn" onclick="doLogout()">登出</button>

  </div>
</div>

<!-- Week Tabs -->
<div class="week-tabs">

    第一週

  <div class="week-tab w2" onclick="switchWeek(2)">

  </div>
  <div class="week-tab w3" onclick="switchWeek(3)">
    <span class="tab-emoji">📙</span>
    第三週
    <div class="tab-sub">開發客戶 · 實戰</div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Sidebar Day List -->
  <div class="day-list">
    <div class="day-list-title">選擇日期</div>
    <div id="dayListContainer"></div>
  </div>

  <!-- Day Content -->
  <div class="day-content" id="dayContentContainer"></div>

</div>

<script>
// =============================================
//  CURRICULUM DATA — 21 days
// =============================================
const curriculum = [
  // ===== WEEK 1 =====
  {
    day: 1, week: 1,
    title: "為什麼要做保險？",
    subtitle: "建立正確的銷售心態，從這裡開始",
    tags: ["心態建立", "使命感"],
    sections: [
      {
        type: "concept",
        title: "今日核心概念",

        content: `21天前，你可能還不知道怎麼跟客戶開口。\n\n今天，你已經擁有了一套完整的銷售系統：<strong>心態 → 客戶開發 → 需求分析 → 產品知識 → 建議呈現 → 促成成交 → 客戶維護 → 再開發</strong>。\n\n這個循環就是你的事業引擎，只要不斷轉動，成功就會到來。`
      },
      {
        type: "checklist",
        title: "21天畢業自我評核",
        icon: "🏆",
        items: [
          "我有清晰的銷售使命和動力",
          "我有一份持續更新的客戶名單",
          "我熟悉公司主力產品的核心賣點",
          "我能完整做需求分析和建議呈現",
          "我有應對常見拒絕的話術",
          "我已開始維護客戶關係並嘗試轉介紹",
          "我設定了活動量目標並開始追蹤",
          "我有個人學習和發展計劃"
        ]
      },
      {
        type: "tip",
        title: "給你的最後一句話",
        icon: "💪",
        color: "blue",
        content: "保險銷售沒有捷徑，但有方向。21天只是起點，真正的成長在接下來的每一次拜訪、每一個電話、每一份用心準備的建議書裡。相信自己，持續行動，成功會來找你。加油！🎯"
      },
      {
        type: "task",
        title: "畢業作業",
        items: [
          "完成21天畢業自我評核清單",
          "寫一份「給未來自己的信」（3個月後讀）",
          "與上司設定未來3個月的業績目標",
          "慶祝自己完成了這21天！你值得🎉"
        ]
      }
    ]
  }
];

// =============================================
//  STATE
// =============================================
let currentWeek = 1;
let currentDay = 1;
let completedDays = JSON.parse(localStorage.getItem('insuranceTraining_completed') || '[]');

function saveCompleted() {
  localStorage.setItem('insuranceTraining_completed', JSON.stringify(completedDays));
}

// =============================================
//  RENDER
// =============================================
function renderDayList() {
  const container = document.getElementById('dayListContainer');
  const days = curriculum.filter(d => d.week === currentWeek);
  container.innerHTML = days.map(d => `
    <button class="day-btn ${d.day === currentDay ? 'active' : ''} ${completedDays.includes(d.day) ? 'done' : ''}"
      onclick="selectDay(${d.day})">
      <span class="check">${completedDays.includes(d.day) ? '✓' : ''}</span>
      Day ${d.day}
    </button>
  `).join('');
}

function renderDayContent() {
  const container = document.getElementById('dayContentContainer');
  container.innerHTML = curriculum.map(d => `
    <div class="day-card ${d.day === currentDay ? 'active' : ''}" id="card-day-${d.day}">
      ${renderCardHeader(d)}
      <div class="card-body">
        ${d.sections.map(s => renderSection(s, d.week)).join('')}
      </div>
      ${renderCardNav(d)}
    </div>
  `).join('');
}

function weekColor(week) {
  return week === 1 ? '' : week === 2 ? 'green' : 'orange';
}

function renderCardHeader(d) {
  const wClass = `w${d.week}`;
  return `
    <div class="card-header ${wClass}">
      <div class="card-day-num">第${d.week}週 · Day ${d.day}</div>
      <div class="card-title">${d.title}</div>
      <div class="card-subtitle">${d.subtitle}</div>
      <div class="card-tags">
        ${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    </div>
  `;
}

function renderSection(s, week) {
  const color = weekColor(week);
  switch(s.type) {
    case 'concept':
      return `<div class="section">
        <div class="section-title"><span class="icon">${s.icon}</span>${s.title}</div>
        <div class="concept-box ${s.color || color}">${s.content.replace(/\n/g,'<br>')}</div>
      </div>`;
    case 'steps':
      return `<div class="section">
        <div class="section-title"><span class="icon">${s.icon}</span>${s.title}</div>
        <ul class="step-list">
          ${s.items.map((item, i) => `<li>
            <span class="step-num ${s.color || color}">${i+1}</span>
            <span>${item.text}</span>
          </li>`).join('')}
        </ul>
      </div>`;
    case 'script':
      return `<div class="section">
        <div class="section-title"><span class="icon">${s.icon}</span>${s.title}</div>
        <div class="script-box">
          ${s.dialogue.map(line => `
            <div><span class="role">${line.role}：</span>${line.text}</div>
          `).join('<br>')}
        </div>
      </div>`;
    case 'tip':
      return `<div class="section">
        <div class="section-title"><span class="icon">${s.icon}</span>${s.title}</div>
        <div class="tip-box ${s.color === 'blue' ? 'blue' : s.color === 'red' ? 'red' : ''}">
          <span style="font-size:1.2rem">💡</span>
          <span>${s.content}</span>
        </div>
      </div>`;
    case 'checklist':
      return `<div class="section">
        <div class="section-title"><span class="icon">${s.icon}</span>${s.title}</div>
        <ul class="checklist">
          ${s.items.map(item => `<li><span>${item}</span></li>`).join('')}
        </ul>
      </div>`;
    case 'task':
      return `<div class="section">
        <div class="task-box">
          <h4>📝 ${s.title}</h4>
          <ul>${s.items.map(item => `<li>${item}</li>`).join('')}</ul>
        </div>
      </div>`;
    default:
      return '';
  }
}

function renderCardNav(d) {
  const isDone = completedDays.includes(d.day);
  return `
    <div class="card-nav">
      <button class="nav-btn prev" onclick="goDay(${d.day - 1})" ${d.day === 1 ? 'disabled' : ''}>← 上一天</button>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
        <button class="mark-done-btn ${isDone ? 'done' : ''}" onclick="toggleDone(${d.day})" id="done-btn-${d.day}">
          ${isDone ? '✓ 已完成' : '☐ 標記完成'}
        </button>
        <button class="submit-btn" onclick="submitHomework(${d.day})">📝 提交今日作業</button>
      </div>
      <button class="nav-btn next" onclick="goDay(${d.day + 1})" ${d.day === 21 ? 'disabled' : ''}>下一天 →</button>
    </div>
  `;
}

function submitHomework(day) {
  const name = sessionStorage.getItem('trainee_name') || '';
  const baseUrl = 'https://docs.google.com/forms/d/e/1FAIpQLScT5lSECD0i11yhZGdKvyx9ov3cZAB8LXfAQi33DrQAyw4XOQ/viewform';
  // 預先填入姓名和天數
  const url = baseUrl + '?usp=pp_url'
    + '&entry.name=' + encodeURIComponent(name)
    + '#day=' + day;
  window.open(url, '_blank');
}

function updateProgress() {
  const pct = (completedDays.length / 21 * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completedDays.length} / 21 天`;
}

// =============================================
//  INTERACTIONS
// =============================================
function switchWeek(week) {
  currentWeek = week;
  // Find first day of that week
  const firstDay = curriculum.find(d => d.week === week);
  if (firstDay) currentDay = firstDay.day;
  document.querySelectorAll('.week-tab').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === week);
  });
  renderDayList();
  showCurrentCard();
}

function selectDay(day) {
  currentDay = day;
  renderDayList();
  showCurrentCard();
  window.scrollTo({top: 300, behavior: 'smooth'});
}

function goDay(day) {
  if (day < 1 || day > 21) return;
  // Switch week if needed
  const target = curriculum.find(d => d.day === day);
  if (target && target.week !== currentWeek) {
    currentWeek = target.week;
    document.querySelectorAll('.week-tab').forEach((el, i) => {
      el.classList.toggle('active', i + 1 === currentWeek);
    });
  }
  currentDay = day;
  renderDayList();
  showCurrentCard();
  window.scrollTo({top: 300, behavior: 'smooth'});
}

function showCurrentCard() {
  document.querySelectorAll('.day-card').forEach(el => el.classList.remove('active'));
  const card = document.getElementById(`card-day-${currentDay}`);
  if (card) card.classList.add('active');
}

function toggleDone(day) {
  const idx = completedDays.indexOf(day);
  if (idx === -1) {
    completedDays.push(day);
  } else {
    completedDays.splice(idx, 1);
  }
  saveCompleted();
  updateProgress();
  // Update button
  const btn = document.getElementById(`done-btn-${day}`);
  const isDone = completedDays.includes(day);
  btn.classList.toggle('done', isDone);
  btn.textContent = isDone ? '✓ 已完成' : '☐ 標記完成';
  // Update sidebar
  renderDayList();
}

// =============================================
//  INIT
// =============================================
renderDayContent();
renderDayList();
updateProgress();

// 顯示已登入用戶姓名
(function() {
  const name = sessionStorage.getItem('trainee_name');
  if (name) {
    document.getElementById('headerName').textContent = name;
  }
})();

function doLogout() {
  if (confirm('確定要登出嗎？')) {
    sessionStorage.removeItem('trainee_name');
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('loginName').value = '';
    document.getElementById('loginPassword').value = '';
  }
}

</script>
</body>
</html>
